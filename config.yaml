reddit:
  # Subreddits to scrape for engagement analysis
  analysis_subreddits:
    - ArmeniansGlobal
    - armenia
    - hayastan
    - armenianhistory
    - history
    - worldnews
    - europe
    - geopolitics
    - caucasus

  # Posts to fetch per subreddit per analysis cycle
  posts_per_subreddit: 100
  # Minimum score to include in training data
  min_score_threshold: 10
  # Time filters: hour, day, week, month, year, all
  time_filter: month

post_generation:
  # Minimum content length to generate a post from (characters)
  min_content_length: 200
  # Maximum post ideas to generate per cycle
  max_ideas_per_cycle: 20
  # Post title max length (Reddit limit is 300)
  max_title_length: 280

ab_testing:
  # Number of variants to generate per post idea
  variants_per_post: 2
  # Minimum sample size before declaring winner
  min_sample_size: 30
  # Statistical significance threshold
  significance_threshold: 0.05
